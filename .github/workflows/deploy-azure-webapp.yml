name: deploy-azure-webapp

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  WEBAPP_NAME: pimento-demo-v2
  PROJECT_PATH: PIMento.Demo.Web/PIMento.Demo.Web.csproj

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore PIMento.Demo.sln

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -o ${{ github.workspace }}/publish

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: webapp-package
          path: ${{ github.workspace }}/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: webapp-package
          path: ${{ github.workspace }}/publish

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          package: ${{ github.workspace }}/publish

      - name: Smoke test deployed routes
        shell: pwsh
        env:
          DEPLOYED_URL: ${{ steps.deploy.outputs.webapp-url }}
        run: |
          $base = $env:DEPLOYED_URL
          if ([string]::IsNullOrWhiteSpace($base)) {
            $base = "https://${{ env.WEBAPP_NAME }}.azurewebsites.net"
          }

          function Test-RouteWithRetry {
            param(
              [string]$Uri,
              [int]$MaxAttempts = 8,
              [int]$RetryDelaySeconds = 10
            )

            for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
              try {
                $response = Invoke-WebRequest -Uri $Uri -UseBasicParsing -MaximumRedirection 5 -TimeoutSec 60
                if ($response.StatusCode -lt 400) {
                  return $response.StatusCode
                }
              }
              catch {
                if ($attempt -eq $MaxAttempts) {
                  throw
                }
              }

              Start-Sleep -Seconds $RetryDelaySeconds
            }

            throw "Route did not become healthy: $Uri"
          }

          $paths = @('/', '/Index', '/Account/Login', '/Home/Cache')
          foreach ($path in $paths) {
            $uri = "$base$path"
            try {
              $status = Test-RouteWithRetry -Uri $uri
              Write-Host "$path -> $status"
            }
            catch {
              throw "Smoke test failed for $uri. $($_.Exception.Message)"
            }
          }
