name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore PHXCOM.VehiclesDemo.sln

      - name: Build
        run: dotnet build PHXCOM.VehiclesDemo.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test PHXCOM.VehiclesDemo.sln --no-build --configuration Release --verbosity normal

      - name: Dependency audit
        run: dotnet list PHXCOM.VehiclesDemo.Web/PHXCOM.VehiclesDemo.Web.csproj package --vulnerable --include-transitive
